<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Consumo de cable - Compras públicas Ecuador</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo-container">
    <img src="logo.png" class="logo">
  </div>

  <h1>Consumo de cable - Compras públicas Ecuador</h1>

  <img src="https://flagcdn.com/w40/ec.png" class="flag">
</div>

<!-- KPIs -->
<div class="kpis">
  <div class="kpi"><h3>Total Metros</h3><p id="totalKPI">0</p></div>
  <div class="kpi"><h3>Top Tecnología</h3><p id="topTecKPI">-</p></div>
  <div class="kpi"><h3># Empresas</h3><p id="empresasKPI">0</p></div>
  <div class="kpi"><h3>Top Nivel</h3><p id="topNivelKPI">-</p></div>
</div>

<!-- FILTROS -->
<div class="filters">

  <div class="filter-group">
    <label>Empresa</label>
    <div id="empresaFilter" class="filter-buttons"></div>
  </div>

  <div class="filter-group">
    <label>Nivel</label>
    <div id="nivelFilter" class="filter-buttons"></div>
  </div>

  <div class="filter-group">
    <label>Material</label>
    <div id="materialFilter" class="filter-buttons"></div>
  </div>

  <button id="resetBtn">Reset</button>

</div>

<!-- CONTENIDO -->
<div class="main-container">

  <div class="charts-container">
    <div class="chart-box"><canvas id="techChart"></canvas></div>
    <div class="chart-box"><canvas id="materialChart"></canvas></div>
    <div class="chart-box full"><canvas id="nivelChart"></canvas></div>
  </div>

  <div class="ranking">
    <h3>🏆 Top Tecnologías</h3>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Tecnología</th>
          <th>Metros</th>
        </tr>
      </thead>
      <tbody id="rankingTable"></tbody>
    </table>
  </div>

</div>

<div class="footer">
Contacto: Andrés Cuadrado / Cablec - Prysmian Ecuador /
Telf: 0998879869 / andres.cuadrado.ex@prysmian.com
</div>

<script src="script.js"></script>
</body>
</html>
